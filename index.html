<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Cậu...</title>
    
    <!-- Import Google Fonts: Lora cho nội dung mượt mà, cảm xúc -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset & Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a; /* Nền tối cinematic */
            color: #e0e0e0; /* Chữ sáng mờ */
            font-family: 'Lora', serif;
            overflow: hidden; /* Ẩn thanh cuộn của body */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container chính của ứng dụng */
        #main-app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lớp dùng chung cho các màn hình để có hiệu ứng Fade */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* 2. Màn hình Mật khẩu (Screen 1) */
        #login-screen {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            z-index: 10;
        }

        .login-container {
            text-align: center;
            padding: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* Responsive cho màn hình nhỏ */
            width: 90%;
            max-width: 400px;
        }

        .login-title {
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-style: italic;
            color: #888;
        }

        #password-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #555;
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            padding: 10px;
            width: 80%; /* Chiếm 80% chiều rộng container */
            max-width: 200px;
            letter-spacing: 5px;
            outline: none;
            transition: border-color 0.3s;
            font-family: monospace;
        }

        #password-input:focus {
            border-bottom: 1px solid #aaa;
        }

        #open-btn {
            margin-top: 30px;
            background: transparent;
            border: 1px solid #555;
            color: #888;
            padding: 10px 30px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-family: 'Lora', serif;
            letter-spacing: 1px;
        }

        #open-btn:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Hiệu ứng rung khi sai mật khẩu */
        .shake {
            animation: shakeAnimation 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeAnimation {
            10%, 90% { transform: translate3d(-2px, 0, 0); border-bottom-color: #ff4d4d; }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* 3. Màn hình Đọc thư (Screen 2) */
        #letter-screen {
            padding: 10vh 5%; /* Padding trên dưới và hai bên linh hoạt */
            background: radial-gradient(circle at center, #151515 0%, #050505 100%);
            align-items: flex-start; /* Căn chữ từ trên xuống */
            justify-content: flex-start;
            overflow-y: auto; /* Cho phép cuộn khi thư dài */
            scroll-behavior: smooth;
            cursor: pointer; /* Biểu tượng con trỏ có thể click */
        }

        /* Ẩn thanh cuộn mặc định cho đẹp */
        #letter-screen::-webkit-scrollbar {
            display: none;
        }
        #letter-screen {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #text-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            padding-bottom: 100px; /* Không gian trống ở đáy để cuộn dễ hơn */
        }

        /* Class cho từng đoạn văn bản */
        .paragraph {
            /* Kích thước chữ mặc định (Desktop) */
            font-size: 1.8rem; 
            line-height: 1.8;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            margin-bottom: 40px; /* Khoảng cách giữa các đoạn */
            transition: opacity 1.5s ease;
        }

        /* Hiệu ứng làm mờ đoạn văn cũ */
        .paragraph.dimmed {
            opacity: 0.3;
        }

        /* Con trỏ nhấp nháy */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #888;
            vertical-align: middle;
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Dòng chữ nhắc nhở "Chạm để đọc tiếp" */
        #continue-prompt {
            /* Kích thước chữ mặc định */
            font-size: 1.1rem;
            color: #555;
            font-style: italic;
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            animation: pulseText 2s infinite ease-in-out;
            letter-spacing: 2px;
        }

        #continue-prompt.show {
            opacity: 1;
            visibility: visible;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* --- RESPONSIVE CSS (Điều chỉnh cho các màn hình khác nhau) --- */

        /* Cho Máy tính bảng và Điện thoại (Màn hình nhỏ hơn 768px) */
        @media screen and (max-width: 768px) {
            .paragraph {
                font-size: 1.4rem; /* Giảm cỡ chữ */
                line-height: 1.6;
                margin-bottom: 30px;
            }
            #continue-prompt {
                font-size: 0.9rem;
            }
            .login-title {
                font-size: 1rem;
            }
            #password-input {
                font-size: 1.2rem;
            }
        }

        /* Đặc biệt cho Điện thoại để DỌC (Portrait) */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            #letter-screen {
                padding: 5vh 5%; /* Giảm padding trên dưới */
            }
            .paragraph {
                font-size: 1.2rem; /* Cỡ chữ nhỏ hơn nữa cho điện thoại dọc */
                line-height: 1.5;
                margin-bottom: 25px;
                letter-spacing: 0.2px; /* Giảm khoảng cách chữ cho dễ đọc */
            }
            #continue-prompt {
                font-size: 0.8rem;
                letter-spacing: 1px;
            }
            .login-container {
                padding: 30px 20px;
            }
        }

        /* Đặc biệt cho Điện thoại để NGANG (Landscape) */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            #letter-screen {
                padding: 5vh 10%; /* Tăng padding hai bên để không bị quá rộng */
            }
            .paragraph {
                font-size: 1.3rem; /* Cỡ chữ vừa phải */
                line-height: 1.6;
                margin-bottom: 20px; /* Giảm khoảng cách đoạn vì màn hình ngang bị thấp */
            }
            #text-container {
                padding-bottom: 50px; /* Giảm không gian ở đáy */
            }
            .login-container {
                padding: 20px; /* Giảm padding container login */
                margin-top: 10px;
            }
            .login-title {
                margin-bottom: 15px; /* Giảm khoảng cách */
            }
            #open-btn {
                margin-top: 15px;
            }
        }

    </style>
</head>

            "Chỉ mong một ngày nào đó, khi cậu đọc được những dòng này, những muộn phiền cũ sẽ tan biến. Cảm ơn cậu vì đã từng xuất hiện trong thanh xuân của tôi...",

            "Tôi biết, có những lúc sự im lặng của tôi đã làm cậu buồn. Có những lời chưa kịp nói ra, và có những lỗi lầm tôi chưa đủ can đảm để xin lỗi một cách trọn vẹn.",

            "Tôi biết, có những lúc sự im lặng của tôi đã làm cậu buồn. Có những lời chưa kịp nói ra, và có những lỗi lầm tôi chưa đủ can đảm để xin lỗi một cách trọn vẹn.",

            "Tôi biết, có những lúc sự im lặng của tôi đã làm cậu buồn. Có những lời chưa kịp nói ra, và có những lỗi lầm tôi chưa đủ can đảm để xin lỗi một cách trọn vẹn.",
            "Chỉ mong một ngày nào đó, khi cậu đọc được những dòng này, những muộn phiền cũ sẽ tan biến. Cảm ơn cậu vì đã từng xuất hiện trong thanh xuân của tôi...",
            "Đã lâu rồi chúng ta không nói chuyện với nhau... Khung chat vẫn ở đó, nhưng chẳng còn dòng tin nhắn nào mới được gửi đi.",
            "Tôi biết, có những lúc sự im lặng của tôi đã làm cậu buồn. Có những lời chưa kịp nói ra, và có những lỗi lầm tôi chưa đủ can đảm để xin lỗi một cách trọn vẹn.",
            "Chỉ mong một ngày nào đó, khi cậu đọc được những dòng này, những muộn phiền cũ sẽ tan biến. Cảm ơn cậu vì đã từng xuất hiện trong thanh xuân của tôi..."
        ];

        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const letterScreen = document.getElementById('letter-screen');
        const passwordInput = document.getElementById('password-input');
        const openBtn = document.getElementById('open-btn');
        const bgMusic = document.getElementById('bg-music');
        const textContainer = document.getElementById('text-container');
        const continuePrompt = document.getElementById('continue-prompt');

        // --- State Variables ---
        let currentPartIndex = 0;
        let isTyping = false;
        let waitingForClick = false;
        let currentParagraph = null;

        // --- LOGIC MÀN HÌNH 1: ĐĂNG NHẬP ---
        function handleLogin() {
            const val = passwordInput.value;
            if (val === CORRECT_PASSWORD) {
                // Fade out login, fade in letter
                loginScreen.classList.remove('visible');
                loginScreen.classList.add('hidden');
                
                setTimeout(() => {
                    letterScreen.classList.remove('hidden');
                    letterScreen.classList.add('visible');
                    
                    bgMusic.volume = 0.5;
                    bgMusic.play().catch(err => console.log("Trình duyệt chặn autoplay audio", err));
                    
                    // Bắt đầu gõ đoạn thư đầu tiên
                    startTypingPart(currentPartIndex);
                }, 1500);
            } else {
                passwordInput.classList.remove('shake');
                void passwordInput.offsetWidth; // Trigger reflow
                passwordInput.classList.add('shake');
                passwordInput.value = "";
            }
        }

        openBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });


        // --- LOGIC MÀN HÌNH 2: TYPEWRITER (CÁCH 2 - VIẾT TIẾP XUỐNG DƯỚI) ---
        function startTypingPart(index) {
            isTyping = true;
            waitingForClick = false;
            
            // Làm mờ tất cả các đoạn văn cũ trước khi viết đoạn mới
            const allParagraphs = document.querySelectorAll('.paragraph');
            allParagraphs.forEach(p => p.classList.add('dimmed'));

            // Tạo thẻ div mới cho đoạn văn hiện tại và chèn vào container
            currentParagraph = document.createElement('div');
            currentParagraph.className = 'paragraph';
            currentParagraph.innerHTML = '<span class="cursor"></span>';
            textContainer.appendChild(currentParagraph);

            const textToType = letterContents[index];
            let charIndex = 0;
            
            function typeNextChar() {
                if (charIndex < textToType.length) {
                    const char = textToType.charAt(charIndex);
                    
                    // Cập nhật chữ trong đoạn văn hiện tại
                    currentParagraph.innerHTML = textToType.substring(0, charIndex + 1) + '<span class="cursor"></span>';
                    charIndex++;

                    // Kiểm tra xem người dùng có đang ở gần cuối trang không (cách đáy dưới 150px)
                    const isNearBottom = letterScreen.scrollHeight - letterScreen.scrollTop - letterScreen.clientHeight < 150;

                    // Chỉ tự động cuộn xuống nếu người dùng đang ở cuối trang
                    // Dùng 'auto' thay vì 'smooth' khi gõ từng chữ để tránh bị giật lag
                    if (isNearBottom) {
                        letterScreen.scrollTo({
                            top: letterScreen.scrollHeight,
                            behavior: 'auto'
                        });
                    }

                    // Tính toán độ trễ (Tốc độ gõ)
                    let delay = 5 + Math.random() * 50; 
                    if (char === ',' || char === '.' || char === '…') {
                        delay += 400 + Math.random() * 300;
                    }
                    if (Math.random() < 0.05) {
                        delay += 300;
                    }

                    setTimeout(typeNextChar, delay);
                } else {
                    // Gõ xong đoạn hiện tại
                    isTyping = false;
                    currentParagraph.innerHTML = textToType; // Xóa con trỏ nhấp nháy

                    if (currentPartIndex < letterContents.length - 1) {
                        // Nếu còn đoạn tiếp theo, hiện nhắc nhở và chờ người dùng chạm
                        continuePrompt.classList.add('show');
                        // Di chuyển nhắc nhở xuống cuối container
                        letterScreen.appendChild(continuePrompt);
                        waitingForClick = true;
                        
                        // Cuộn thêm một chút để thấy rõ nhắc nhở
                        setTimeout(() => {
                            letterScreen.scrollTo({ top: letterScreen.scrollHeight, behavior: 'smooth' });
                        }, 100);
                        
                    } else {
                        // NẾU LÀ ĐOẠN CUỐI CÙNG
                        setTimeout(() => {
                            // Tạo chữ ký/chốt lại ở cuối
                            const endMark = document.createElement('div');
                            endMark.className = 'paragraph';
                            endMark.style.textAlign = 'right';
                            endMark.style.marginTop = '60px';
                            endMark.style.fontSize = '1.3rem';
                            endMark.style.color = '#777';
                            endMark.style.fontStyle = 'italic';
                            endMark.innerText = "— Gửi từ một người đã từng —";
                            textContainer.appendChild(endMark);
                            
                            // Cuộn xuống dòng cuối
                            letterScreen.scrollTo({ top: letterScreen.scrollHeight, behavior: 'smooth' });

                            // SAU ĐÓ: Thắp sáng lại toàn bộ bức thư
                            setTimeout(() => {
                                const allParagraphs = document.querySelectorAll('.paragraph');
                                allParagraphs.forEach(p => p.classList.remove('dimmed'));
                            }, 1500);

                        }, 1000);
                    }
                }
            }
            
            // Bắt đầu gõ sau một khoảng nghỉ 1 giây
            setTimeout(typeNextChar, 1000);
        }

        // --- SỰ KIỆN: CHẠM ĐỂ ĐỌC TIẾP ---
        // Người dùng có thể click chuột hoặc chạm ngón tay vào bất cứ đâu trên màn hình đọc thư
        letterScreen.addEventListener('click', () => {
            if (waitingForClick && !isTyping) {
                // Ẩn nhắc nhở
                continuePrompt.classList.remove('show');
                waitingForClick = false;
                
                // Chuyển sang đoạn tiếp theo
                currentPartIndex++;
                startTypingPart(currentPartIndex);

                // Cuộn mượt xuống đáy khi người dùng bắt đầu đọc đoạn mới
                setTimeout(() => {
                    letterScreen.scrollTo({ top: letterScreen.scrollHeight, behavior: 'smooth' });
                }, 50);
            }
        });

    </script>
</body>
